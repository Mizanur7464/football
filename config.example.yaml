# Get API id/hash: https://my.telegram.org/apps
telethon:
  api_id: 12345678
  api_hash: "your_api_hash_here"
  session_name: "relay_session"

relay:
  # Listen to multiple sources; optional per-route source_chat_ids limits that rule.
  source_chat_ids:
    - "123456789"
    - "987654321"

  # If you use routes below, target_chat_id can be empty (or use fallback_target_chat_id).
  target_chat_id: ""

  control_chat_id: ""

  # Buyer-style alerts: route by "Bet Type:" line — one message -> one group.
  routes:
    - name: "1H Goal (Yes) Opportunity"
      match:
        contains: ["1H Goal (Yes) Opportunity"]
      target_chat_id: "https://t.me/+INVITE_HASH_OR_-100_ID"

    - name: "1.5+ Goals Opportunity"
      match:
        contains: ["1.5+ Goals Opportunity"]
      target_chat_id: "https://t.me/+INVITE_HASH_OR_-100_ID"

    - name: "BTTS Opportunity"
      match:
        contains: ["BTTS Opportunity"]
      target_chat_id: "https://t.me/+INVITE_HASH_OR_-100_ID"

    - name: "New Foul Alert (Yellow Card bot)"
      match:
        contains: ["New Foul Alert"]
      source_chat_ids:
        - "987654321"
      target_chat_id: "https://t.me/+jFIkgl-i638yYTM0"

    - name: "Over 1 FHG"
      match:
        regex: 'Bet Type:\s*Over\s*1\s*FHG'
      target_chat_id: "-1001111111111"

    - name: "BTTS"
      match:
        regex: 'Bet Type:.*BTTS'
      target_chat_id: "-1002222222222"

    - name: "1.5+ Goals"
      match:
        regex: 'Bet Type:.*1\.5\s*\+?\s*Goals'
      target_chat_id: "-1003333333333"

    - name: "Yellow Card"
      match:
        regex: 'Bet Type:.*Yellow\s*Card'
      source_chat_ids:
        - "987654321"
      target_chat_id: "-1004444444444"

  fallback_target_chat_id: ""

  # Optional: same source chat — only relay messages that pass this first, then routes.
  filter:
    require_any_contains: ["Bet Type"]
    # require_regex: "Bet Type:"
    # skip_if_any_contains: ["promo"]
    # skip_if_regex: "(?i)unwanted"

transform:
  prepend_text: ""
  append_text: ""
  replace:
    - from: "oddsalerts.com"
      to: "Odds Provider"
